services:
  db:
    image: postgres:18
    env_file:
      - ${MINIAPP_ENV_FILE:-/opt/miniapp/.env}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ${MINIAPP_ENV_FILE:-/opt/miniapp/.env}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  migration:
    build: ./backend/main_api
    command: alembic upgrade head
    env_file:
      - ${MINIAPP_ENV_FILE:-/opt/miniapp/.env}
    depends_on:
      db:
        condition: service_healthy

  main_api:
    build: ./backend/main_api
    env_file:
      - ${MINIAPP_ENV_FILE:-/opt/miniapp/.env}
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${MINIAPP_ROOT:-/opt/miniapp}/certs:/etc/nginx/certs:ro
    depends_on:
      - main_api
      - minio
    restart: unless-stopped

  adminer:
    image: adminer:latest
    profiles: ["debug"]
    env_file:
      - ${MINIAPP_ENV_FILE:-/opt/miniapp/.env}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
