services:
  db:
    image: postgres:18
    container_name: db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      - app-network
  adminer:
    image: adminer:latest
    container_name: adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  main_api:
    build: ./main_api
    container_name: main_api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:password@db:5432/app
      DB_SCHEMA: main_api
      INFO_API_URL: http://info_api:5001
      BASE_PRICE: 5000
    depends_on:
      - db
      - info_api
      - adminer
    networks:
      - app-network

  info_api:
    build: ./info_api
    container_name: info_api
    ports:
      # Убрать мепинг портов
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:password@db:5432/app
      DB_SCHEMA: info_api
    depends_on:
      - db
    networks:
      - app-network

  info_migration:
    build: ./info_api
    container_name: info_migration
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:password@db:5432/app
    depends_on:
      - db
    networks:
      - app-network
  main_migration:
    build: ./main_api
    container_name: main_migration
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:password@db:5432/app
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - main_api
      - info_api
    networks:
      - app-network

  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - frontend
  #     - agent_service

volumes:
  postgres_data:

networks:
  app-network: